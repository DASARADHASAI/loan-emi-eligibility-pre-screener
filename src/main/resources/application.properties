spring.application.name=loanlens
server.port=${PORT:8081}

# Local file-based H2 for user accounts — persists across restarts, no setup needed.
spring.datasource.url=jdbc:h2:file:./data/loanlens;AUTO_SERVER=TRUE
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
